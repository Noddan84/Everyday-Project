name: Tests (Init → Parallel Execution)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Initialization job - sets up dependencies once
  init:
    name: Setup & Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

  # Playwright tests - runs in parallel after init
  playwright-tests:
    name: Playwright Tests
    needs: init
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Run Playwright tests (Headless)
      run: npx playwright test
    
    - name: Upload Playwright Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  # Cypress tests - runs in parallel after init
  cypress-tests:
    name: Cypress Tests
    needs: init
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run Cypress tests (Headless)
      run: npx cypress run --headless
    
    - name: Upload Cypress Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: cypress-report
        path: cypress/videos/
        retention-days: 30
